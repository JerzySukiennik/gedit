<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Gedit">
  <title>Gedit</title>
  <!--
    macOS app icon, same recipe as microg-icon.svg: rounded square drawn in
    (icns is not auto-masked), 824x824 content box inside 1024, same
    translate/scale as MicroG because the glyph bounding box is identical
    (crop-mark occupies the same x60-132 / y74-172 box mu did).
  -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="#0d0d0f"/>
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5"
        fill="none" stroke="#ffffff" stroke-opacity=".10" stroke-width="1"/>
  <g transform="translate(179.4,260.9) scale(2.146)">
    <g fill="none" stroke="#fff" stroke-width="15" stroke-linecap="butt" stroke-linejoin="round" transform="translate(0,11)">
      <path d="M60 104 L60 74 L96 74"/>
      <path d="M132 142 L132 172 L96 172"/>
      <path d="M243 62 a50 50 0 1 0 0 56 V90 H200"/>
    </g>
  </g>
</svg>
